{% load i18n %}
{% get_current_language as current_language %}
{% get_available_languages as available_languages %}
{% get_language_info_list for available_languages as language_info_list %}

<label class="visually-hidden" for="language-selector">{% trans "Language selector" %}</label>
<select id="language-selector" class="form-select" aria-label="{% trans 'Language selector' %}" data-language-selector>
  {% for language in language_info_list %}
    {% translate_url language.code as localized_url %}
    <option value="{{ localized_url }}" {% if language.code == current_language %}selected{% endif %}>
      {{ language.code|upper }}
    </option>
  {% endfor %}
</select>
