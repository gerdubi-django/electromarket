{% extends 'base.html' %}
{% load i18n %}
{% block title %}{% trans 'Perfil' %} | ElectroMarket{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-lg-7">
    <div class="card p-3 p-md-4">
      <h1 class="h4 mb-3">{% trans "Perfil" %}</h1>
      <form method="post" class="d-grid gap-3">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary">{% trans "Guardar cambios" %}</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
