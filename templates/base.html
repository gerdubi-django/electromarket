{% load i18n static %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ElectroMarket{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{% static 'core/css/styles.css' %}" rel="stylesheet">
</head>
<body>
  {% include 'partials/navbar.html' %}
  <main class="container py-4">
    {% for message in messages %}<div class="alert alert-info">{{ message }}</div>{% endfor %}
    {% block content %}{% endblock %}
  </main>
  <script src="{% static 'core/js/app.js' %}"></script>
</body>
</html>
