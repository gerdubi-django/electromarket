{% extends 'base.html' %}
{% block content %}<h2>Orders</h2><table class="table table-dark"><tr><th>ID</th><th>User</th><th>Total</th><th>Status</th><th></th></tr>{% for o in orders %}<tr><td>{{ o.id }}</td><td>{{ o.user.username }}</td><td>${{ o.total }}</td><td>{{ o.get_status_display }}</td><td><a class="btn btn-sm btn-info" href="{% url 'dashboard:order_status' o.id %}">Change</a></td></tr>{% endfor %}</table>{% endblock %}
