{% extends 'base.html' %}
{% load i18n %}
{% block title %}{% trans 'Ingresar' %} | ElectroMarket{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-7 col-lg-5">
    <div class="card p-3 p-md-4">
      <h1 class="h4 mb-3">{% trans "Ingresar" %}</h1>
      <form method="post" class="d-grid gap-3">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary">{% trans "Entrar" %}</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
