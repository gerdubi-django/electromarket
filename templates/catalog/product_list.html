{% extends 'base.html' %}
{% load i18n %}
{% block content %}
<h2>{% trans "Products" %}</h2>
<form method="get" class="row g-2 mb-4">
  <div class="col-md-4"><input name="search" class="form-control" placeholder="{% trans 'Search products' %}" value="{{ request.GET.search }}"></div>
  <div class="col-md-3"><select name="category" class="form-select"><option value="">{% trans "All categories" %}</option>{% for cat in categories %}<option value="{{ cat.slug }}">{{ cat.name }}</option>{% endfor %}</select></div>
  <div class="col-md-2"><input name="min_price" type="number" step="0.01" class="form-control" placeholder="Min"></div>
  <div class="col-md-2"><input name="max_price" type="number" step="0.01" class="form-control" placeholder="Max"></div>
  <div class="col-md-1"><button class="btn btn-info w-100">{% trans "Go" %}</button></div>
</form>
<div class="row g-4">{% for product in products %}<div class="col-6 col-md-3"><div class="card product-card h-100"><img src="{{ product.image_url|default:'https://placehold.co/600x400' }}" class="card-img-top"><div class="card-body"><h6>{{ product.name }}</h6><small>{{ product.category.name }}</small><p>${{ product.price }}</p><a href="{{ product.get_absolute_url }}" class="btn btn-sm btn-info">{% trans "View" %}</a></div></div></div>{% endfor %}</div>
{% endblock %}
