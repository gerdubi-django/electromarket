{% extends 'base.html' %}
{% block content %}<h2>Products</h2><a class="btn btn-info mb-2" href="{% url 'dashboard:product_create' %}">New product</a> <a class="btn btn-outline-info mb-2" href="{% url 'dashboard:category_create' %}">New category</a><table class="table table-dark"><tr><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th></th></tr>{% for p in products %}<tr><td>{{ p.name }}</td><td>{{ p.category }}</td><td>${{ p.price }}</td><td>{{ p.stock }}</td><td><a href="{% url 'dashboard:product_update' p.id %}" class="btn btn-sm btn-warning">Edit</a> <a href="{% url 'dashboard:product_delete' p.id %}" class="btn btn-sm btn-danger">Delete</a></td></tr>{% endfor %}</table>{% endblock %}
