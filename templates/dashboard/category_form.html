{% extends 'base.html' %}
{% load i18n %}
{% block content %}
<h1 class="h3 mb-3">{% trans "Formulario de categoría" %}</h1>
<form method="post" class="card p-3 p-md-4">
  {% csrf_token %}
  {{ form.as_p }}
  <div class="d-flex justify-content-end gap-2">
    <a href="{% url 'dashboard:products' %}" class="btn btn-outline-light">{% trans "Cancelar" %}</a>
    <button class="btn btn-primary">{% trans "Guardar" %}</button>
  </div>
</form>
{% endblock %}
